<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | iOS Interface</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- GSAP for Smooth Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Google Fonts (Inter to mimic Apple's San Francisco) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --jarvis-cyan: #00d2ff;
            --ios-glass: rgba(255, 255, 255, 0.05);
            --ios-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow: hidden; /* Prevent body scroll, handle inside containers */
            -webkit-font-smoothing: antialiased;
        }
        /* 3D Background Container */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--ios-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--ios-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .chat-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        /* Message Bubbles */
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-msg {
            background: #0a84ff; /* iOS Blue */
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .jarvis-msg {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }
        .jarvis-highlight { color: var(--jarvis-cyan); font-weight: 600; }
        
        /* Mic pulsing animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }
        .mic-active {
            background-color: #ff3b30 !important;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body class="flex flex-col h-screen text-white relative">

    <!-- 3D Orb Background -->
    <div id="canvas-container"></div>

    <!-- Main UI Wrapper -->
    <div class="relative z-10 flex flex-col h-full w-full max-w-4xl mx-auto p-4 sm:p-6 pb-6 gap-4">
        
        <!-- Header & Widgets (Stacked vertically on mobile, row on desktop) -->
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 gs-reveal">
            <div class="glass-panel px-6 py-3 rounded-full flex items-center gap-3 w-full sm:w-auto justify-center">
                <div class="w-3 h-3 rounded-full bg-[#00d2ff] shadow-[0_0_10px_#00d2ff]"></div>
                <span class="font-semibold tracking-wider text-sm">J.A.R.V.I.S. OS_v2.0</span>
            </div>
            
            <!-- Weather Widget -->
            <div id="weather-widget" class="glass-panel px-5 py-3 rounded-2xl w-full sm:w-auto text-center sm:text-right text-sm">
                Fetching atmospheric data...
            </div>
        </header>

        <!-- Chat Mainframe -->
        <main class="glass-panel flex-1 rounded-3xl overflow-hidden flex flex-col gs-reveal mt-2">
            <!-- Messages Area -->
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-4 chat-scroll">
                <div class="msg-bubble jarvis-msg">
                    <span class="jarvis-highlight">System online.</span> UI upgraded to iOS glassmorphism standards. Conversational memory active. How can I assist you today, sir?
                </div>
            </div>

            <!-- Input Dock (iOS Style) -->
            <div class="p-3 sm:p-4 bg-black/40 border-t border-white/10">
                <div class="glass-panel rounded-full flex items-center px-2 py-2 gap-2">
                    <button id="mic-btn" onclick="toggleVoice()" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all shrink-0">
                        🎙️
                    </button>
                    <input type="text" id="user-input" placeholder="Message J.A.R.V.I.S..." autocomplete="off" onkeypress="handleEnter(event)"
                        class="flex-1 bg-transparent border-none outline-none text-white px-2 placeholder-gray-400 text-sm sm:text-base">
                    <button onclick="processCommand()" class="w-10 h-10 rounded-full bg-[#0a84ff] hover:bg-blue-500 flex items-center justify-center transition-all shrink-0 shadow-lg shadow-blue-500/30">
                        ↑
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- API CONFIGURATION ---
        const GEMINI_API_KEY = 'AIzaSyCBpMBk46AUaKKA3KqYGhcX20utknowr6k';
        const GNEWS_API_KEY = '4149e06aaecae2d8416f228ea74aded5';
        
        // --- CONVERSATIONAL MEMORY ---
        let chatHistory = []; 
        let isListening = false;

        // --- DOM ELEMENTS ---
        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('user-input');
        const micBtn = document.getElementById('mic-btn');
        const weatherWidget = document.getElementById('weather-widget');

        // --- INITIALIZATION ---
        window.onload = () => {
            initThreeJS();
            initGSAP();
            fetchWeather(); // Automatically fetch weather on load
        };

        // --- 1. THREE.JS 3D AI ORB ---
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Create a glowing, wireframe AI Orb
            const geometry = new THREE.SphereGeometry(15, 32, 32);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00d2ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            camera.position.z = 30;

            function animate() {
                requestAnimationFrame(animate);
                sphere.rotation.x += 0.001;
                sphere.rotation.y += 0.002;
                renderer.render(scene, camera);
            }
            animate();

            // Handle Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- 2. GSAP ANIMATIONS ---
        function initGSAP() {
            gsap.from(".gs-reveal", {
                y: 40,
                opacity: 0,
                duration: 1,
                stagger: 0.2,
                ease: "power3.out"
            });
        }

        // --- 3. WEATHER SYNC (GUJRANWALA) ---
        async function fetchWeather() {
            try {
                // Open-Meteo API (Free, No Key needed) for Gujranwala (Lat: 32.16, Lon: 74.18)
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.16&longitude=74.18&current_weather=true');
                const data = await res.json();
                const temp = data.current_weather.temperature;
                weatherWidget.innerHTML = `📍 Gujranwala <br> <span class="text-[#00d2ff] font-bold">${temp}°C</span> | Atmospheric conditions stable.`;
            } catch (e) {
                weatherWidget.innerHTML = "Weather uplink offline.";
            }
        }

        // --- 4. SPEECH RECOGNITION (VOICE TO TEXT) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('mic-active');
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputField.value = transcript;
                processCommand(); // Auto-send when done speaking
            };
            
            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('mic-active');
            };
        }

        function toggleVoice() {
            if (!recognition) {
                appendMessage('JARVIS', 'Voice recognition is not supported in this browser. Please use Chrome or Safari.');
                return;
            }
            if (isListening) recognition.stop();
            else recognition.start();
        }

        // --- 5. CHAT LOGIC & APIs ---
        function handleEnter(e) { if (e.key === 'Enter') processCommand(); }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${sender === 'User' ? 'user-msg' : 'jarvis-msg'}`;
            
            if (sender === 'JARVIS') {
                // Add minor formatting for JARVIS
                const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<span class="jarvis-highlight">$1</span>');
                div.innerHTML = formattedText;
                speak(text); // Text to speech
            } else {
                div.innerText = text;
            }

            chatBox.appendChild(div);
            
            // GSAP pop animation for new messages
            gsap.from(div, { scale: 0.9, opacity: 0, duration: 0.3, ease: "back.out(1.5)" });
            
            // Auto scroll to bottom
            setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // Stop current speech if typing new command
            const cleanText = text.replace(/<[^>]*>?/gm, '').replace(/\*/g, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.pitch = 0.9; 
            utterance.rate = 1.05;
            window.speechSynthesis.speak(utterance);
        }

        async function processCommand() {
            const command = inputField.value.trim();
            if (!command) return;

            appendMessage('User', command);
            inputField.value = '';

            // Easter Egg: Confetti
            if (command.toLowerCase().includes('confetti') || command.toLowerCase().includes('party')) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                appendMessage('JARVIS', 'Deploying celebratory countermeasures, sir.');
                return;
            }

            // Command Routing
            if (command.toLowerCase().includes('news')) {
                await fetchNews();
            } else {
                await fetchGemini(command);
            }
        }

        // --- GNEWS API ---
        async function fetchNews() {
            appendMessage('JARVIS', 'Scanning global intelligence feeds...');
            try {
                const response = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=en&apikey=${GNEWS_API_KEY}`);
                const data = await response.json();
                
                if (data.articles && data.articles.length > 0) {
                    let newsSummary = "Here is the global briefing:<br><br>";
                    for (let i = 0; i < Math.min(3, data.articles.length); i++) {
                        newsSummary += `• <a href="${data.articles[i].url}" target="_blank" class="text-[#00d2ff] underline">${data.articles[i].title}</a><br>`;
                    }
                    // Remove "Scanning..." message, replace with real news
                    chatBox.removeChild(chatBox.lastChild);
                    appendMessage('JARVIS', newsSummary);
                }
            } catch (error) {
                chatBox.removeChild(chatBox.lastChild);
                appendMessage('JARVIS', 'Error establishing connection with global news servers.');
            }
        }

        // --- GEMINI API (WITH MEMORY) ---
        async function fetchGemini(prompt) {
            appendMessage('JARVIS', 'Processing request...');
            const loadingMsg = chatBox.lastChild; // Keep track of loading bubble to replace it

            // Add User message to memory
            chatHistory.push({ "role": "user", "parts": [{ "text": prompt }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { 
                            parts: [{ text: "You are JARVIS, Tony Stark's highly advanced AI. You are witty, deeply intelligent, extremely concise, and helpful. You are communicating through a sleek, iOS-style mobile interface. Keep your answers brief and impactful." }] 
                        },
                        contents: chatHistory // Sends entire conversation history for context
                    })
                });
                
                const data = await response.json();
                if (data.candidates && data.candidates.length > 0) {
                    const reply = data.candidates[0].content.parts[0].text;
                    
                    // Add JARVIS response to memory
                    chatHistory.push({ "role": "model", "parts": [{ "text": reply }] });

                    // Replace loading message
                    chatBox.removeChild(loadingMsg);
                    appendMessage('JARVIS', reply);
                } else {
                    throw new Error("Cognitive failure");
                }
            } catch (error) {
                chatBox.removeChild(loadingMsg);
                appendMessage('JARVIS', 'Neural network offline or API quota exceeded. Please check system parameters.');
            }
        }
    </script>
</body>
</html>
